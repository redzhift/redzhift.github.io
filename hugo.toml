baseURL = "https://redzhift.github.io/"
locale = "en-US"
title = "Jin Y.C"
# theme = "lotusdocs"
contentDir = "content"
enableEmoji = true
enableGitInfo = true # N.B. .GitInfo does not currently function with submodule content directories

[build]
  noJSConfigInAssets = true

[module]
    [[module.imports]]
        path = "github.com/colinwilson/lotusdocs"
        disable = false
    [[module.imports]]
        path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
        disable = false

[markup]
    [markup.tableOfContents]
      endLevel = 3
      startLevel = 1
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true # https://jdhao.github.io/2019/12/29/hugo_html_not_shown/
  [markup.goldmark.parser]
    [markup.goldmark.parser.attribute]
      block = true

[params]

  # Google Fonts
  google_fonts = [
    ["Mozilla Text", "300, 400, 600, 700"],
    ["Fira Code", "500, 700"]
  ]

  sans_serif_font = "Mozilla Text"     # Default is System font
  secondary_font  = "Mozilla Text"     # Default is System font
  mono_font       = "Fira Code" # Default is System font

    [params.footer]
        copyright = "© :YEAR: Jin Y.C. | `redzhift@tuta.io`"
        version   = true # include git commit info in footer

    [params.social]
        github = "redzhift" # github.com/YOUR_GITHUB_ID
        linkedin = "in/linkedin"           
        rss = false                     # show rss icon with link

    [params.docs] # Parameters for the /docs 'template'
        title           = "Docs"                        # default html title for documentation pages/sections

        pathName        = "docs"                            # path for documentation site | default "docs"

        themeColor      = "red"                            # (optional) - Set theme accent colour. Options include: blue (default), green, red, yellow, emerald, cardinal, magenta, cyan

        darkMode        = true                                # enable dark mode option? default false

        prism           = true                                # enable syntax highlighting via Prism

        prismTheme      = "twilight"                         # (optional) - Set theme for PrismJS. Options include: lotusdocs (default), solarized-light, twilight, lucario

        # gitinfo
        repoURL         = "https://github.com/redzhift/"  # Git repository URL for your site [support for GitHub, GitLab, and BitBucket]
        repoBranch      = ""                           # Name of your Git repository branch
        editPage        = false                                # enable 'Edit this page' feature - default false
        lastMod         = true                                # enable 'Last modified' date on pages - default false
        lastModRelative = false                                # format 'Last modified' time as relative - default true

        # ToC
        toc             = true                                # enable table of contents? default is true
        tocMobile       = true                                # enable table of contents in mobile view? default is true
        scrollSpy       = true                                # enable scrollspy on ToC? default is true

        # icons
        sidebarIcons    = true                                # enable sidebar icons? default false
        titleIcon       = true                                # enable front matter icon title prefix? default is false

        # content navigation
        breadcrumbs     = true                                # default is true
        navDesc         = true                                # include front matter descriptions in Prev/Next navigation cards
        navDescTrunc    = 30                                  # Number of characters by which to truncate the Prev/Next descriptions

        listDescTrunc   = 100                                 # Number of characters by which to truncate the list card description
        backToTop       = true                                # enable back-to-top button? default true

        # front matter
        descriptions    = true                                # enable front matter descriptions under content title?

        # Link behaviour
        intLinkTooltip  = false                                # Enable a tooltip for internal links that displays info about the destination? default false
        # extLinkNewTab   = false                             # Open external links in a new Tab? default true
        logoLinkURL     = "/"                                 # Set a custom URL destination for the top header logo link.

    [params.flexsearch] # Parameters for FlexSearch
        enabled             = true
        # tokenize            = "full"
        # optimize            = true
        # cache               = 40
        # minQueryChar        = 3 # default is 0 (disabled)
        # maxResult           = 8 # default is 5
        # searchSectionsIndex = []

[menu]
[[menu.primary]]
    name = "About"
    url = "/docs/about"
    identifier = "about"
    weight = 10
[[menu.primary]]
    name  = "Docs"
    url = "/docs/"
    identifier = "docs"
    weight = 20
[[menu.primary]]
    name = "Repo"
    url = "https://github.com/redzhift/redzhift.github.io"
    identifier = "github"
    weight = 30

[caches]
    [[caches.images]]
        dir = ":cacheDir/images"
    [[caches.pdfs]]
        dir = ":cacheDir/pdfs"
    [[caches.docs]]
        dir = ":contentDir/docs"
