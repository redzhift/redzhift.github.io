# Hero
hero:
  enable: true
  weight: 10
  template: hero

  backgroundImage:
    path: "images/"
    filename:
      desktop: "gradient-desktop-2.webp"
      mobile: "gradient-desktop-2.webp"

  badge:
    text: v1.0.1
    color: primary # primary, secondary, success, danger, warning, info, light, dark
    pill: false # boolean
    soft: true # boolean

  titleLogo:
    path: "images/logos"
    filename: "title_logo.png"
    alt: "Lotus Docs Logo"
    height: 80px

  title: "Jin Y.C"
  subtitle: Technical Writer

  ctaButton:
    icon: auto_awesome
    btnText: "About me"
    url: "/docs/about"
  cta2Button:
    icon: person
    btnText: "LinkedIn"
    url: "https://linkedin.com/in/redzhift"

  info: ""

